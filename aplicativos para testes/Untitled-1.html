 <html>
<head>
    <title>calculadora simples</title>
</head>
<body>
    <h1>Calculadora Simples</h1>
    <input type="number" id="num1" placeholder="Digite o primeiro número">
    <input type="number" id="num2" placeholder="Digite o segundo número">
    <button onclick="somar()">+</button>
    <button onclick="restar()">-</button>
    <button onclick="multiplicar()">*</button>
    <button onclick="dividir()">/</button>
    <button onclick="testarSoma()">Testar Soma</button>
    <button onclick="testarSubtracao()">Testar Subtração</button>
    <button onclick="testarMultiplicacao()">Testar Multiplicação</button>
    <button onclick="testarDivisao()">Testar Divisão</button>
    <p id="resultado"></p>
    <script>
        function somar() {
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let resultado = num1 + num2;
            document.getElementById('resultado').innerText = 'Resultado: ' + resultado;
        }
        function restar() {
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let resultado = num1 - num2;
            document.getElementById('resultado').innerText = 'Resultado: ' + resultado;
        }
        function multiplicar() {
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let resultado = num1 * num2;
            document.getElementById('resultado').innerText = 'Resultado: ' + resultado;
        }
        function dividir() {
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            if (num2 === 0) {
                document.getElementById('resultado').innerText = 'Erro: Divisão por zero';
            } else {
                let resultado = num1 / num2;
                document.getElementById('resultado').innerText = 'Resultado: ' + resultado;
            }
        }
        function testarSoma() {
        (document.getElementById("num1").value) = "1";
        (document.getElementById("num2").value) = "1";
        somar();
         const resultadodaoperacao = document.getElementById("resultado").innerText;
         if (resultadodaoperacao === "Resultado: 2") {
            document.getElementById('resultado').innerText = 'Teste passou: 1 + 1 = 2';
         } else {
            document.getElementById('resultado').innerText = 'Teste falhou: 1 + 1 não é igual a 2';
         }
        }
        function testarSubtracao() {
            (document.getElementById("num1").value) = "1";
            (document.getElementById("num2").value) = "1";
            restar();
            const resultadodaoperacao = document.getElementById("resultado").innerText;
            if (resultadodaoperacao === "Resultado: 0") {
                document.getElementById('resultado').innerText = 'Teste passou: 1 - 1 = 0';
            } else {
                document.getElementById('resultado').innerText = 'Teste falhou: 1 - 1 não é igual a 0';
            }
        }
         function testarMultiplicacao() {
            (document.getElementById("num1").value) = "1";
            (document.getElementById("num2").value) = "1";
            multiplicar();
            const resultadodaoperacao = document.getElementById("resultado").innerText;
            if (resultadodaoperacao === "Resultado: 1") {
                document.getElementById('resultado').innerText = 'Teste passou: 1 * 1 = 1';
            } else {
                document.getElementById('resultado').innerText = 'Teste falhou: 1 * 1 não é igual a 1';
            }
        }
         function testarDivisao() {
            (document.getElementById("num1").value) = "1";
            (document.getElementById("num2").value) = "1";
            dividir();
            const resultadodaoperacao = document.getElementById("resultado").innerText;
            if (resultadodaoperacao === "Resultado: 1") {
                document.getElementById('resultado').innerText = 'Teste passou: 1 / 1 = 1';
            } else {
                document.getElementById('resultado').innerText = 'Teste falhou: 1 / 1 não é igual a 1';
            }
        }

    
            
    </script>
</body>
</html>
